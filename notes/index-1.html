<script>
// 粒子背景效果
if (window.innerWidth > 768) {
  document.addEventListener('DOMContentLoaded', function() {
    const canvas = document.createElement('canvas');
    canvas.id = 'particle-canvas';
    canvas.style.position = 'fixed';
    canvas.style.top = '0';
    canvas.style.left = '0';
    canvas.style.width = '100%';
    canvas.style.height = '100%';
    canvas.style.zIndex = '-2';
    canvas.style.pointerEvents = 'none';
    document.body.appendChild(canvas);

    const ctx = canvas.getContext('2d');
    canvas.width = window.innerWidth;
    canvas.height = window.innerHeight;

    const particles = [];
    const particleCount = 50;

    class Particle {
      constructor() {
        this.x = Math.random() * canvas.width;
        this.y = Math.random() * canvas.height;
        this.size = Math.random() * 2 + 0.5;
        this.speedX = Math.random() * 1 - 0.5;
        this.speedY = Math.random() * 1 - 0.5;
        this.color = `rgba(100, 150, 255, ${Math.random() * 0.3 + 0.1})`;
      }
      update() {
        this.x += this.speedX;
        this.y += this.speedY;
        if (this.x > canvas.width) this.x = 0;
        if (this.x < 0) this.x = canvas.width;
        if (this.y > canvas.height) this.y = 0;
        if (this.y < 0) this.y = canvas.height;
      }
      draw() {
        ctx.fillStyle = this.color;
        ctx.beginPath();
        ctx.arc(this.x, this.y, this.size, 0, Math.PI * 2);
        ctx.fill();
      }
    }

    for (let i = 0; i < particleCount; i++) {
      particles.push(new Particle());
    }

    function animate() {
      ctx.clearRect(0, 0, canvas.width, canvas.height);
      particles.forEach(particle => {
        particle.update();
        particle.draw();
      });
      requestAnimationFrame(animate);
    }
    animate();

    window.addEventListener('resize', function() {
      canvas.width = window.innerWidth;
      canvas.height = window.innerHeight;
    });
  });
}
</script>

<script>
(function() {
    if (!window.enableEffects) return;

    // 防止重复执行
    if (window.typewriterExecuted) return;
    window.typewriterExecuted = true;

    document.addEventListener('DOMContentLoaded', function() {
        // 查找网站标题和副标题
        const siteTitle = document.querySelector('.site-title');
        const siteSubtitle = document.querySelector('.site-subtitle');
        const brand = document.querySelector('.brand');

        // 选择要应用打字机效果的元素
        const targetElement = siteSubtitle || siteTitle || brand;

        if (targetElement && targetElement.textContent.trim() && !targetElement.hasAttribute('data-typed')) {
            targetElement.setAttribute('data-typed', 'true');
            const originalText = targetElement.textContent.trim();
            targetElement.textContent = '';
            targetElement.style.opacity = '1';

            let i = 0;
            const speed = 80; // 打字速度（毫秒）

            function typeWriter() {
                if (i < originalText.length) {
                    targetElement.textContent += originalText.charAt(i);
                    i++;
                    setTimeout(typeWriter, speed);
                } else {
                    // 打字完成后，可以添加光标闪烁效果
                    const cursor = document.createElement('span');
                    cursor.className = 'typing-cursor';
                    cursor.textContent = '|';
                    cursor.style.animation = 'blink 1s infinite';
                    targetElement.appendChild(cursor);

                    // 添加CSS动画
                    if (!document.querySelector('#typing-cursor-style')) {
                        const style = document.createElement('style');
                        style.id = 'typing-cursor-style';
                        style.textContent = `
                            .typing-cursor {
                                display: inline-block;
                                color: var(--clr-accent-cyan);
                                font-weight: bold;
                                margin-left: 2px;
                            }
                            @keyframes blink {
                                0%, 100% { opacity: 1; }
                                50% { opacity: 0; }
                            }
                        `;
                        document.head.appendChild(style);
                    }
                }
            }

            // 延迟开始打字效果
            setTimeout(typeWriter, 1000);
        }
    });
})();
</script>

<!-- 简单滚动动画（不依赖GSAP） -->
<script>
(function() {
    if (!window.enableEffects) return;

    // 使用Intersection Observer API实现滚动动画
    const observerOptions = {
        threshold: 0.1,
        rootMargin: '0px 0px -50px 0px'
    };

    const observer = new IntersectionObserver((entries) => {
        entries.forEach(entry => {
            if (entry.isIntersecting) {
                entry.target.classList.add('animated');
                // 动画完成后停止观察，防止重复触发
                observer.unobserve(entry.target);
            }
        });
    }, observerOptions);

    // 观察需要动画的元素
    document.addEventListener('DOMContentLoaded', function() {
        const elementsToAnimate = document.querySelectorAll(
            '.post-block, article.post, .card, .post, .post-header, .post-body'
        );

        elementsToAnimate.forEach(el => {
            // 只添加动画样式如果元素还没有动画类
            if (!el.classList.contains('animated')) {
                el.style.opacity = '0';
                el.style.transform = 'translateY(20px)';
                el.style.transition = 'opacity 0.5s ease, transform 0.5s ease';
                observer.observe(el);
            }
        });

        // 添加CSS类
        const style = document.createElement('style');
        style.textContent = `
            .animated {
                opacity: 1 !important;
                transform: translateY(0) !important;
            }
        `;
        document.head.appendChild(style);
    });
})();
</script>
